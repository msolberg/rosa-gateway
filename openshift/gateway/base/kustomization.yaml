apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base configuration - use overlays to set the domain
# Default placeholder: apps.CLUSTER_DOMAIN

resources:
  # Namespace
  - namespace.yaml

  # GatewayClass - must be named "openshift-default"
  - openshift-default.yaml

  # Gateway - creates the gateway infrastructure
  - wildcard-gateway.yaml

  # External service backends (headless Service + EndpointSlice)
  - status-redhat-service.yaml
  - water-usgs-service.yaml

  # Istio configuration
  - status-redhat-destination-rule.yaml
  - water-usgs-destination-rule.yaml

  # HTTPRoutes - routing rules
  - echo-route.yaml
  - status-route.yaml
  - water-usgs-route.yaml
  - water-usgs-redirect-route.yaml

